<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thermal Camera Monitor - Industrial Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .thermal-gradient {
            background: linear-gradient(90deg, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
        }
        /* Custom scrollbar for industrial feel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #161b2a; }
        ::-webkit-scrollbar-thumb { background: #3b4949; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #47eaed; }
        
        .grid-tile-overlay {
            background: linear-gradient(to bottom, rgba(14,19,33,0.8) 0%, rgba(14,19,33,0) 30%, rgba(14,19,33,0) 70%, rgba(14,19,33,0.8) 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#dee2f7",
                        "primary-fixed-dim": "#2ddbde",
                        "secondary-fixed": "#6bfe9c",
                        "inverse-primary": "#00696b",
                        "error": "#ffb4ab",
                        "tertiary": "#ffc9c1",
                        "on-tertiary": "#690001",
                        "on-primary-container": "#005354",
                        "outline-variant": "#3b4949",
                        "on-tertiary-fixed-variant": "#910807",
                        "surface-container-low": "#161b2a",
                        "primary-container": "#00ced1",
                        "secondary-container": "#06bb63",
                        "secondary-fixed-dim": "#4ae183",
                        "surface-variant": "#2f3444",
                        "tertiary-container": "#ffa193",
                        "on-error": "#690005",
                        "on-tertiary-container": "#960e09",
                        "error-container": "#93000a",
                        "surface-container-high": "#252a39",
                        "surface": "#0e1321",
                        "on-background": "#dee2f7",
                        "on-secondary-fixed-variant": "#005228",
                        "secondary": "#4ae183",
                        "surface-container-highest": "#2f3444",
                        "surface-container": "#1a1f2e",
                        "on-primary-fixed-variant": "#004f51",
                        "on-secondary-fixed": "#00210c",
                        "on-primary-fixed": "#002020",
                        "surface-tint": "#2ddbde",
                        "on-secondary-container": "#00431f",
                        "outline": "#859493",
                        "background": "#0e1321",
                        "on-secondary": "#003919",
                        "tertiary-fixed": "#ffdad5",
                        "on-surface": "#dee2f7",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#5af8fb",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "on-primary": "#003738",
                        "on-surface-variant": "#bac9c9",
                        "inverse-on-surface": "#2b3040",
                        "surface-container-lowest": "#090e1c",
                        "surface-dim": "#0e1321",
                        "surface-bright": "#343949",
                        "on-tertiary-fixed": "#410000",
                        "primary": "#47eaed"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-page": "24px",
                        "gutter": "12px",
                        "panel-padding": "16px",
                        "stack-gap": "8px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "data-md": ["JetBrains Mono"],
                        "display-lg": ["Hanken Grotesk"],
                        "data-lg": ["JetBrains Mono"],
                        "label-caps": ["JetBrains Mono"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "data-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "data-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md selection:bg-primary/30 h-screen overflow-hidden flex flex-col">
<!-- TopNavBar -->
<header class="flex justify-between items-center w-full px-margin-page h-16 border-b border-outline-variant bg-surface-container shrink-0">
<div class="flex items-center gap-6">
<span class="font-headline-md text-headline-md font-bold text-on-surface">Thermal Camera Monitor</span>
<div class="relative group">
<button class="flex items-center gap-2 px-3 py-1 bg-surface-variant hover:bg-surface-container-high transition-colors rounded text-label-caps font-label-caps border border-outline-variant">
                    Recipe: Default
                    <span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
</div>
<div class="flex items-center gap-8">
<div class="flex flex-col items-end">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Network Status</span>
<span class="font-data-md text-data-md text-secondary">64/64 connected</span>
</div>
<button class="bg-error hover:bg-error/90 text-on-error px-6 py-2 rounded font-bold text-headline-md tracking-wider transition-all active:scale-95 flex items-center gap-2 shadow-[0_0_15px_rgba(231,76,60,0.3)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">error</span>
                EMERGENCY STOP
            </button>
</div>
</header>
<main class="flex flex-1 overflow-hidden">
<!-- Left Content Area (75%) -->
<section class="w-3/4 flex flex-col border-r border-outline-variant bg-surface overflow-hidden">
<!-- Video Grid Section (60%) -->
<div class="h-[62%] flex flex-col p-4 space-y-3">
<!-- Toolbar -->
<div class="flex justify-between items-center bg-surface-container-low p-2 border border-outline-variant rounded">
<div class="flex gap-1">
<button class="px-3 py-1.5 text-label-caps font-label-caps bg-secondary-container text-on-secondary-container rounded border border-secondary transition-colors">Mode 1 (Auto 8)</button>
<button class="px-3 py-1.5 text-label-caps font-label-caps hover:bg-surface-variant rounded border border-outline-variant transition-colors">Mode 2 (8)</button>
<button class="px-3 py-1.5 text-label-caps font-label-caps hover:bg-surface-variant rounded border border-outline-variant transition-colors">Mode 3 (4)</button>
<button class="px-3 py-1.5 text-label-caps font-label-caps hover:bg-surface-variant rounded border border-outline-variant transition-colors">Mode 4 (2)</button>
<button class="px-3 py-1.5 text-label-caps font-label-caps hover:bg-surface-variant rounded border border-outline-variant transition-colors">Mode 5 (1)</button>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">1s refresh</span>
</div>
<span class="text-label-caps font-label-caps text-on-surface">Page 1/8</span>
<div class="flex border border-outline-variant rounded">
<button class="p-1 hover:bg-surface-variant border-r border-outline-variant"><span class="material-symbols-outlined text-lg">chevron_left</span></button>
<button class="p-1 hover:bg-surface-variant"><span class="material-symbols-outlined text-lg">chevron_right</span></button>
</div>
</div>
</div>
<!-- 2x4 Grid -->
<div class="flex-1 grid grid-cols-4 grid-rows-2 gap-2 overflow-hidden">
<!-- Camera Tiles -->
<script>
                        const renderTiles = () => {
                            const grid = document.currentScript.parentElement;
                            for(let i=1; i<=8; i++) {
                                const tile = document.createElement('div');
                                tile.className = "relative group rounded overflow-hidden border border-outline-variant bg-surface-container-lowest transition-all hover:border-primary cursor-pointer";
                                const temp = (40 + Math.random() * 5).toFixed(1);
                                tile.innerHTML = `
                                    <div class="absolute inset-0 opacity-80 mix-blend-screen bg-no-repeat bg-cover bg-center" 
                                         style="background-image: url('https://images.unsplash.com/photo-1544333346-60868846c483?auto=format&fit=crop&q=80&w=400&h=300')"
                                         data-alt="A thermal imaging heatmap display of an industrial factory floor with high temperature zones glowing in vibrant oranges and reds against a dark cool background of blues and purples. The visual style is high-contrast infrared with granular data textures and digital noise. The atmosphere is technical and mission-critical.">
                                    </div>
                                    <div class="absolute inset-0 thermal-gradient opacity-10"></div>
                                    <div class="absolute inset-0 grid-tile-overlay p-2 flex flex-col justify-between">
                                        <div class="flex justify-between items-start">
                                            <span class="bg-surface/80 px-2 py-0.5 rounded text-label-caps font-label-caps border border-outline-variant">CAM-0${i}</span>
                                            <span class="material-symbols-outlined text-secondary opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
                                        </div>
                                        <div class="flex items-baseline gap-1 bg-surface/60 backdrop-blur-sm p-1.5 rounded self-end border border-outline-variant">
                                            <span class="text-data-lg font-data-lg text-primary">${temp}</span>
                                            <span class="text-label-caps font-label-caps text-primary">°C</span>
                                        </div>
                                    </div>
                                `;
                                grid.appendChild(tile);
                            }
                        };
                        renderTiles();
                    </script>
</div>
</div>
<!-- Bottom Chart Section (40%) -->
<div class="h-[38%] border-t border-outline-variant p-4 bg-surface-container-lowest flex flex-col">
<div class="flex justify-between items-center mb-4">
<h2 class="font-headline-md text-headline-md flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">thermostat</span>
                        Chamber Temp / Humidity
                    </h2>
<div class="flex gap-4">
<div class="flex items-center gap-2 bg-surface-container p-2 rounded border border-outline-variant">
<span class="w-3 h-1 bg-error rounded-full"></span>
<span class="text-label-caps font-label-caps text-on-surface-variant">Temp</span>
<span class="text-data-md font-data-md text-error">45.2°C</span>
</div>
<div class="flex items-center gap-2 bg-surface-container p-2 rounded border border-outline-variant">
<span class="w-3 h-1 bg-primary rounded-full"></span>
<span class="text-label-caps font-label-caps text-on-surface-variant">Humidity</span>
<span class="text-data-md font-data-md text-primary">38%RH</span>
</div>
</div>
</div>
<!-- Chart Area -->
<div class="flex-1 relative bg-surface-container rounded border border-outline-variant overflow-hidden group">
<div class="absolute inset-0 grid grid-cols-12 pointer-events-none">
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
<div class="border-r border-outline-variant/30 h-full"></div>
</div>
<div class="absolute inset-0 grid grid-rows-4 pointer-events-none">
<div class="border-b border-outline-variant/30 w-full"></div>
<div class="border-b border-outline-variant/30 w-full"></div>
<div class="border-b border-outline-variant/30 w-full"></div>
</div>
<!-- Simulated Vector Curves -->
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none">
<!-- Humidity Line -->
<path class="text-primary opacity-60" d="M 0 100 Q 150 80 300 110 T 600 90 T 900 120 L 1200 100" fill="none" stroke="currentColor" stroke-width="2"></path>
<!-- Temp Line -->
<path class="text-error" d="M 0 60 Q 200 40 400 70 T 800 30 T 1200 50" fill="none" stroke="currentColor" stroke-width="2"></path>
</svg>
<!-- Time labels -->
<div class="absolute bottom-2 left-0 right-0 px-4 flex justify-between text-label-caps font-label-caps text-on-surface-variant/60">
<span>14:00</span><span>14:15</span><span>14:30</span><span>14:45</span><span>15:00</span><span>15:15</span><span>15:30</span>
</div>
</div>
</div>
</section>
<!-- Right Sidebar (25%) -->
<aside class="w-1/4 bg-surface-container-low flex flex-col">
<!-- Header -->
<div class="p-4 border-b border-outline-variant">
<div class="flex justify-between items-center mb-1">
<h3 class="font-headline-md text-headline-md">Cameras</h3>
<span class="text-label-caps font-label-caps text-secondary">64 Active Units</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded px-9 py-2 text-body-md focus:border-primary focus:ring-0" placeholder="Search devices..." type="text"/>
<span class="material-symbols-outlined absolute left-2 top-2.5 text-on-surface-variant">search</span>
</div>
</div>
<!-- Scrollable List -->
<div class="flex-1 overflow-y-auto p-2 space-y-2">
<!-- Agent PC #1 -->
<div class="border border-outline-variant rounded overflow-hidden">
<button class="w-full flex items-center justify-between p-2 bg-surface-variant hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">expand_more</span>
<span class="text-label-caps font-label-caps uppercase">Agent PC #1 (16)</span>
</div>
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<div class="p-1 space-y-1">
<script>
                            for(let i=1; i<=6; i++) {
                                document.write(`
                                    <div class="flex items-center justify-between p-2 hover:bg-surface-container rounded cursor-pointer group">
                                        <div class="flex items-center gap-3">
                                            <span class="w-2 h-2 rounded-full ${i < 5 ? 'bg-secondary' : 'bg-outline'} shadow-[0_0_5px_rgba(46,204,113,0.3)]"></span>
                                            <span class="text-body-md font-medium">CAM-0${i}</span>
                                        </div>
                                        <span class="material-symbols-outlined text-on-surface-variant opacity-30 group-hover:opacity-100">drag_indicator</span>
                                    </div>
                                `);
                            }
                        </script>
</div>
</div>
<!-- Agent PC #2 -->
<div class="border border-outline-variant rounded overflow-hidden">
<button class="w-full flex items-center justify-between p-2 bg-surface-variant hover:bg-surface-container-high transition-colors opacity-80">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">chevron_right</span>
<span class="text-label-caps font-label-caps uppercase">Agent PC #2 (16)</span>
</div>
<span class="text-label-caps font-label-caps text-on-surface-variant">IDLE</span>
</button>
</div>
<!-- Repeat for demo -->
<div class="border border-outline-variant rounded overflow-hidden">
<button class="w-full flex items-center justify-between p-2 bg-surface-variant hover:bg-surface-container-high transition-colors opacity-80">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">chevron_right</span>
<span class="text-label-caps font-label-caps uppercase">Agent PC #3 (16)</span>
</div>
<span class="text-label-caps font-label-caps text-on-surface-variant">IDLE</span>
</button>
</div>
</div>
<!-- Footer Controls -->
<div class="p-4 border-t border-outline-variant bg-surface-container flex flex-col gap-2">
<button class="w-full bg-secondary hover:bg-secondary-container text-on-secondary py-3 rounded-lg font-bold text-headline-md transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    START
                </button>
<div class="grid grid-cols-2 gap-2">
<button class="bg-surface-variant hover:bg-error-container hover:text-on-error-container border border-outline-variant py-2 rounded text-label-caps font-label-caps uppercase transition-colors">
                        STOP
                    </button>
<button class="bg-surface-variant hover:bg-surface-container-high border border-outline-variant py-2 rounded text-label-caps font-label-caps uppercase transition-colors">
                        CONFIG
                    </button>
</div>
</div>
</aside>
</main>
<!-- UI Interaction Overlay (Subtle scanline effect) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-50 overflow-hidden">
<div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
</div>
<script>
        // Simulate data updates
        setInterval(() => {
            const dataValues = document.querySelectorAll('.text-data-lg');
            dataValues.forEach(val => {
                const current = parseFloat(val.innerText);
                const drift = (Math.random() - 0.5) * 0.4;
                val.innerText = (current + drift).toFixed(1);
            });
        }, 1000);
    </script>
</body></html>
